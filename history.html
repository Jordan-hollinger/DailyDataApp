<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History — Daily Log</title>
  <link rel="stylesheet" href="static/css/style.css">
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>

  <!-- Auth screen -->
  <div id="authScreen" class="auth-screen" style="display:none">
    <div class="auth-card">
      <h1 class="auth-title">Daily Log</h1>
      <p class="auth-subtitle">Sign in to view your history</p>
      <p id="setupMsg" class="auth-setup-msg" style="display:none">
        <strong>Setup required.</strong><br>
        Add your Google Client ID to <code>static/js/config.js</code>.
      </p>
      <button id="signInBtn" class="btn btn-google" onclick="auth.signIn()">
        Sign in with Google
      </button>
      <p id="signInError" class="auth-error" style="display:none">Sign-in failed. Please try again.</p>
    </div>
  </div>

  <!-- Main content -->
  <div id="app" class="history-page" style="display:none">
    <div class="history-header">
      <h1>Daily Log History</h1>
      <div class="history-actions">
        <button class="btn btn-export" onclick="sheets.exportCSV()">Download CSV</button>
        <a id="openSheetBtn" href="#" target="_blank" class="btn btn-sheet" style="display:none">Open Google Sheet</a>
        <a href="index.html" class="btn btn-next">Log Today</a>
      </div>
    </div>
    <div id="historyContent"></div>

    <div class="sign-out-bar">
      <button class="btn-sign-out" onclick="auth.signOut()">Sign out</button>
    </div>
  </div>

  <script src="static/js/config.js"></script>
  <script src="static/js/storage.js"></script>
  <script src="static/js/auth.js"></script>
  <script src="static/js/sheets.js"></script>
  <script src="static/js/history.js"></script>
  <script>auth.init();</script>
</body>
</html>
